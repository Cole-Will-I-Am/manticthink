name = "manticthink"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = true

# SEER chat UI is served from ./public as static assets; the Worker handles /api/*.
[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker before serving static assets, so visit-counting fires on the page load.
# The Worker's catch-all serves the page/assets via env.ASSETS; trackVisit only counts
# document navigations, so asset requests through the Worker aren't miscounted.
run_worker_first = true

# Aggregate, privacy-preserving event counters (no keys, no message content).
# Tracks the connect funnel: key-validation attempts/outcomes and chats sent.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "manticthink_events"

# Stores debates that users explicitly Share (so /d/<id> short links work).
# Only shared-debate content lands here — never API keys or other chats.
[[kv_namespaces]]
binding = "DEBATES"
id = "23843e5a2c7f425ba9274ee811c90827"

# Stores codebases users explicitly Share (so /c/<id> short links work).
[[kv_namespaces]]
binding = "CODEBASES"
id = "a77d67b50b834f9aaa04eabf9e944e44"

# Non-secret config (edit freely, then redeploy). The model list shows in the
# picker; set these to the Ollama models you actually have access to.
[vars]
OLLAMA_BASE_URL = "https://ollama.com"
# Fallback list shown only if the live per-key catalog can't be fetched; the
# app normally auto-loads every model the user's key can access.
CHAT_MODELS = "gpt-oss:120b,gpt-oss:20b,qwen3-coder:480b,qwen3-coder-next,qwen3.5:397b,deepseek-v4-pro,deepseek-v4-flash,deepseek-v3.2,deepseek-v3.1:671b,glm-5.2,glm-5.1,glm-5,glm-4.7,kimi-k2.7-code,kimi-k2.6,kimi-k2.5,minimax-m3,minimax-m2.7,minimax-m2.5,minimax-m2.1,gemini-3-flash-preview,gemma4:31b,gemma3:27b,gemma3:12b,gemma3:4b,mistral-large-3:675b,devstral-2:123b,devstral-small-2:24b,ministral-3:14b,ministral-3:8b,ministral-3:3b,nemotron-3-ultra,nemotron-3-super,nemotron-3-nano:30b,rnj-1:8b"
DEFAULT_MODEL = "gpt-oss:120b"

# Bring-your-own-key: each visitor enters their own Ollama API key in the browser.
# The Worker forwards it upstream per request and never stores it, so there is NO
# server-side OLLAMA_API_KEY secret to set.
#
# Custom domains — Cloudflare manages DNS + TLS automatically.
[[routes]]
pattern = "manticthink.com"
custom_domain = true

[[routes]]
pattern = "www.manticthink.com"
custom_domain = true

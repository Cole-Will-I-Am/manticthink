<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SEER · Mantic Think</title>
<meta name="description" content="SEER — a quiet interface for thinking with Ollama models. Bring your own key." />
<link rel="stylesheet" href="/vendor/github-dark.min.css" />
<link rel="stylesheet" href="/app.css" />
</head>
<body>
  <!-- Gate: shown until a valid key is connected -->
  <section id="gate">
    <span class="wordmark">SEER</span>
    <span class="gate-label">Mantic Think</span>
    <div class="card">
      <input id="keyInput" type="password" placeholder="Paste your Ollama API key" autocomplete="off" spellcheck="false" />
      <div class="gate-err" id="gateErr"></div>
      <button class="btn-primary" id="connect">Connect</button>
      <div class="hint">
        Bring your own key. It is stored only in this browser and sent directly to Ollama through our proxy — never saved on our servers.<br/>
        <a href="https://ollama.com/settings/keys" target="_blank" rel="noopener">Get an Ollama API key →</a>
      </div>
    </div>
  </section>

  <!-- App shell: sidebar + chat pane -->
  <div id="app" class="hidden">
    <div id="scrim"></div>

    <aside id="sidebar">
      <div class="side-head">
        <span class="wordmark">SEER</span>
        <button id="newChat" class="side-new" title="New conversation">
          <span class="plus">+</span> New chat
        </button>
      </div>
      <div id="convList" class="conv-list"></div>
      <div class="side-foot">
        <button class="ghost" id="disconnect" title="Remove key">Sign out</button>
      </div>
    </aside>

    <div id="chatPane">
      <header>
        <button id="menuBtn" class="icon-btn drawer-only" title="Conversations" aria-label="Conversations">☰</button>
        <div class="brand">
          <span class="wordmark">SEER</span>
          <span class="tagline" id="headerTitle">Mantic Think</span>
        </div>
        <span class="spacer"></span>
        <select id="model" title="Model"></select>
        <div class="settings-wrap">
          <button id="settingsBtn" class="icon-btn" title="Generation settings" aria-label="Settings">⚙</button>
          <div id="settingsPanel" class="settings-panel hidden">
            <div class="sp-head">Generation</div>
            <div class="sp-row">
              <div class="sp-label"><span>Temperature</span><span id="tempVal">0.80</span></div>
              <input id="tempSlider" type="range" min="0" max="2" step="0.05" value="0.8" />
              <div class="sp-hint">Lower = focused &amp; precise · Higher = creative</div>
            </div>
          </div>
        </div>
      </header>

      <main id="main">
        <div class="thread" id="thread"></div>
        <button id="scrollBtn" class="scroll-btn hidden" title="Scroll to latest" aria-label="Scroll to latest">↓</button>
      </main>

      <footer>
        <div class="err" id="err" style="display:none"></div>
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Message SEER…"></textarea>
          <button id="send" title="Send" aria-label="Send">↑</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="/vendor/marked.umd.js"></script>
  <script src="/vendor/purify.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/app.js" defer></script>
</body>
</html>
